<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Közösségünk</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            background-image: url('../img/kozosseg/elokep.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            color: #ffffff;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        .kep-buborek {
            width: 100%;
            max-width: 600px;
            height: 300px;
            background-image: url('../img/kozosseg/hatter.JPG');
            background-size: cover;
            background-position: center;
            border-radius: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .social-card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
            transition: transform 0.3s;
        }

        .social-card:hover { transform: translateY(-10px); }

        .btn {
            display: block;
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .fb { background: #4267B2; }
        .ig { background: #C13584; }
        .yt { background: #FF0000; }

        .vissza-gomb {
            background-color: #ff4757;
            padding: 15px 30px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="kep-buborek"></div>

    <div class="container">
        <h1>Csatlakozz a TAPE közösséghez!</h1>
        <p>Kövess minket a legfrissebb tartalmakért:</p>

        <div class="grid">
            <div class="social-card">
                <h3>Facebook</h3>
                <a href="https://facebook.com/TapeHungary" target="_blank" class="btn fb">Facebook Oldal</a>
            </div>

            <div class="social-card">
                <h3>Instagram</h3>
                <a href="https://instagram.com/tape_hungary" target="_blank" class="btn ig">Instagram Profil</a>
            </div>

            <div class="social-card">
                <h3>YouTube</h3>
                <a href="https://www.youtube.com/@Tape_Hungary" target="_blank" class="btn yt">YouTube Csatorna</a>
            </div>
        </div>
    </div>

    <a href="../index.html" class="vissza-gomb">Vissza a főoldalra</a>

</body>
</html>
