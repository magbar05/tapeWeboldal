<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tape - Hamarosan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0a0a0a;
    --card:#111111;
    --text:#ffffff;
    --muted:#8b8b8b;
    --accent:#ff3b3b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at top, #151515 0%, #0a0a0a 60%);
    font-family:'Inter',sans-serif;
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,59,59,.08);
    border-radius:50%;
    filter:blur(120px);
    animation:float 8s ease-in-out infinite;
}

.container{
    text-align:center;
    z-index:2;
    padding:40px;
}

.logo{
    width:220px;
    max-width:70vw;
    margin-bottom:40px;
    animation:fadeUp 1.2s ease;
    filter:drop-shadow(0 0 30px rgba(255,255,255,.08));
}

h1{
    font-size:clamp(3rem,8vw,6rem);
    font-weight:600;
    letter-spacing:-2px;
    animation:fadeUp 1.4s ease;
}

p{
    margin-top:15px;
    color:var(--muted);
    font-size:1.1rem;
    animation:fadeUp 1.6s ease;
}

.loader{
    width:180px;
    height:4px;
    background:#1d1d1d;
    margin:35px auto 0;
    border-radius:999px;
    overflow:hidden;
}

.loader span{
    display:block;
    width:40%;
    height:100%;
    background:var(--accent);
    border-radius:999px;
    animation:loading 2s infinite ease-in-out;
}

@keyframes loading{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(350%);}
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-30px);
    }
}
</style>
</head>
<body>

<div class="container">

    <img src="tape.jpg" alt="Tape Logo" class="logo">

    <h1>Hamarosan...</h1>

    <p>Valami új készül a Tape-nél.</p>

    <div class="loader">
        <span></span>
    </div>

</div>

</body>
</html>
